security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\AppAuthenticator
           # form_login:
             #   login_path: app_login  # la route qui affiche le formulaire de connexion
              #  check_path: app_login # la route qui traite le formulaire de connexion (même que login_path si pas de route spécifique)
               # enable_csrf: true # active la protection CSRF pour le formulaire de connexion
                #default_target_path: app_homepage # la route vers laquelle rediriger après une connexion réussie
                #failure_path: app_login # la route vers laquelle rediriger après une connexion échouée (par défaut, redirige vers login_path)
                #username_parameter: email  #le nom du champ de formulaire pour le nom d'utilisateur (par défaut, "email");
            logout:
                path: app_logout
                target: app_login
            custom_authenticator: App\Security\AppAuthenticator

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true
                
                # where to redirect after logout (default to homepage)
                # target: app_any_route

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS}
        - { path: ^/, roles: ROLE_USER }
     

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
